spring:
  datasource:
    url: jdbc:h2:mem:logistics_agent_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

agent:
  demo:
    seed-date: 2026-06-04
    reset-on-start: true
  vector-store:
    enabled: false
  embedding:
    provider: hashing
  deepseek:
    enabled: false
