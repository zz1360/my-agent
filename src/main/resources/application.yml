spring:
  application:
    name: logistics-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/spring_ai_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&sslMode=PREFERRED}
    username: ${SPRING_DATASOURCE_USERNAME:spring_ai_app}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: false
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    version: v2.1
    description: Logistics knowledge-base Agent

logging:
  pattern:
    level: "%5p [trace=%X{traceId:-} request=%X{requestId:-} tenant=%X{tenantId:-} user=%X{userId:-} conv=%X{conversationId:-}]"
  level:
    com.superagent.logistics: INFO

agent:
  deployment:
    environment: ${AGENT_ENVIRONMENT:local}
    fail-fast: ${AGENT_DEPLOYMENT_FAIL_FAST:false}
  security:
    enabled: true
    api-key: ${AGENT_API_KEY:}
    api-key-header: X-Agent-Api-Key
    tenant-header: X-Agent-Tenant
    user-header: X-Agent-User
    roles-header: X-Agent-Roles
    protected-path-prefixes:
      - /api/
    public-path-prefixes:
      - /api/demo/
  retrieval:
    default-mode: ${AGENT_RETRIEVAL_DEFAULT_MODE:hybrid_reranker}
  demo:
    seed-date: 2026-06-04
    reset-on-start: false
  deepseek:
    enabled: false
    base-url: https://api.deepseek.com
    api-key-file: ${DEEPSEEK_API_KEY_FILE:}
    model: deepseek-v4-flash
    temperature: 0.2
    max-tokens: 1800
  embedding:
    provider: ${LOCAL_EMBEDDING_PROVIDER:transformers}
    fallback-to-hashing: ${LOCAL_EMBEDDING_FALLBACK_TO_HASHING:false}
    model-name: ${LOCAL_EMBEDDING_MODEL_NAME:BAAI/bge-small-zh-v1.5}
    model-uri: ${LOCAL_EMBEDDING_MODEL_URI:file:./.local-models/bge-small-zh-v1.5/onnx/model_quantized.onnx}
    tokenizer-uri: ${LOCAL_EMBEDDING_TOKENIZER_URI:file:./.local-models/bge-small-zh-v1.5/tokenizer.json}
    model-output-name: ${LOCAL_EMBEDDING_MODEL_OUTPUT_NAME:last_hidden_state}
    cache-directory: ${LOCAL_EMBEDDING_CACHE_DIR:${java.io.tmpdir}/spring-ai-onnx-model}
    disable-caching: ${LOCAL_EMBEDDING_DISABLE_CACHING:true}
    query-instruction: ${LOCAL_EMBEDDING_QUERY_INSTRUCTION:为这个句子生成表示以用于检索相关文章：}
    passage-instruction: ${LOCAL_EMBEDDING_PASSAGE_INSTRUCTION:}
    tokenizer-options:
      padding: "true"
      truncation: "true"
  reranker:
    provider: ${LOCAL_RERANKER_PROVIDER:onnx}
    fallback-to-lightweight: ${LOCAL_RERANKER_FALLBACK_TO_LIGHTWEIGHT:true}
    model-name: ${LOCAL_RERANKER_MODEL_NAME:Xenova/bge-reranker-base}
    model-uri: ${LOCAL_RERANKER_MODEL_URI:file:./.local-models/bge-reranker-base/onnx/model_quantized.onnx}
    tokenizer-uri: ${LOCAL_RERANKER_TOKENIZER_URI:file:./.local-models/bge-reranker-base/tokenizer.json}
    model-output-name: ${LOCAL_RERANKER_MODEL_OUTPUT_NAME:logits}
    max-candidates: ${LOCAL_RERANKER_MAX_CANDIDATES:24}
    model-weight: ${LOCAL_RERANKER_MODEL_WEIGHT:0.72}
    rule-weight: ${LOCAL_RERANKER_RULE_WEIGHT:0.28}
    tokenizer-options:
      padding: "true"
      truncation: "true"
      maxLength: "512"
  vector-store:
    provider: pgvector
    enabled: true
    fail-fast: false
    jdbc-url: ${PGVECTOR_JDBC_URL:jdbc:postgresql://localhost:5432/logistics_agent}
    username: ${PGVECTOR_USERNAME:logistics_agent}
    password: ${PGVECTOR_PASSWORD:}
    table-name: ai_knowledge_vector_chunk_v04
    dimension: 512
    initialize-schema: true
    note: "PGVector selected for local Mac development; see docs/pgvector-local.md."
