<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>物流 Agent 对话台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --text: #182230;
      --muted: #667085;
      --line: #d8dee8;
      --line-soft: #e8edf3;
      --brand: #0f766e;
      --brand-strong: #0b625b;
      --brand-soft: #e7f5f3;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --amber: #b45309;
      --amber-soft: #fff4df;
      --red: #b42318;
      --red-soft: #fff0ee;
      --green: #067647;
      --green-soft: #e8f7ef;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shell {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      min-height: 0;
      padding: 16px 22px 20px;
    }

    .sidebar,
    .chat-panel,
    .details-panel {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      min-height: 0;
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .field-list {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field label,
    .toggle span {
      color: var(--muted);
      font-size: 12px;
    }

    .field input,
    .field textarea {
      width: 100%;
      min-height: 36px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      outline: none;
    }

    .field textarea {
      min-height: 86px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: #344054;
      font-weight: 650;
      white-space: nowrap;
    }

    .button:hover {
      border-color: #aab4c2;
      background: #f9fafb;
    }

    .button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #ffffff;
    }

    .button.primary:hover {
      background: var(--brand-strong);
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }

    .button.compact {
      min-height: 30px;
      padding: 0 9px;
      font-size: 12px;
    }

    .samples {
      display: grid;
      gap: 8px;
      min-height: 0;
      overflow: auto;
    }

    .sample {
      width: 100%;
      padding: 9px;
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: var(--surface-soft);
      color: #344054;
      text-align: left;
      white-space: normal;
    }

    .sample:hover {
      border-color: #bfd0df;
      background: #ffffff;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      min-width: 0;
      min-height: 0;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 56px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .panel-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-line {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .messages {
      display: grid;
      align-content: start;
      gap: 14px;
      min-height: 0;
      overflow: auto;
      padding: 16px;
      background:
        linear-gradient(#ffffff, #ffffff) padding-box,
        linear-gradient(180deg, rgba(15, 118, 110, 0.08), rgba(37, 99, 235, 0.06)) border-box;
    }

    .message {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      gap: 10px;
      max-width: 980px;
    }

    .message.user {
      justify-self: end;
      grid-template-columns: minmax(0, 1fr) 36px;
      max-width: 760px;
    }

    .avatar {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
    }

    .message.assistant .avatar {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .bubble {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #ffffff;
      color: #344054;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      border-color: #c9dafd;
      background: #f7faff;
      color: #1d2939;
    }

    .message-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      max-width: 100%;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f2f4f7;
      color: #344054;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.success {
      background: var(--green-soft);
      color: var(--green);
    }

    .chip.warn {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .chip.danger {
      background: var(--red-soft);
      color: var(--red);
    }

    .chip.info {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .composer {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-top: 1px solid var(--line-soft);
      background: #ffffff;
    }

    .composer-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .composer textarea {
      width: 100%;
      min-height: 76px;
      max-height: 180px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      resize: vertical;
    }

    .composer textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .details-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    .details-body {
      display: grid;
      align-content: start;
      gap: 12px;
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .detail-block {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--surface-soft);
    }

    .detail-block h3 {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0;
    }

    .detail-block p {
      margin: 0;
      color: #344054;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }

    .muted {
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      background: #ffffff;
    }

    th,
    td {
      padding: 8px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      background: #fbfcfd;
      white-space: nowrap;
    }

    .empty {
      padding: 18px 10px;
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: none;
      max-width: min(420px, calc(100vw - 36px));
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.16);
      color: var(--text);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .main {
        grid-template-columns: 1fr;
      }

      .details-panel {
        min-height: 420px;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 16px;
      }

      .top-actions {
        width: 100%;
      }

      .top-actions .button {
        flex: 1;
      }

      .shell {
        grid-template-columns: 1fr;
        padding: 14px 16px 18px;
      }

      .sidebar {
        grid-template-rows: auto auto auto;
      }

      .samples {
        max-height: 220px;
      }

      .composer-row {
        grid-template-columns: 1fr;
      }

      .composer-row .button {
        width: 100%;
      }

      .message,
      .message.user {
        grid-template-columns: 32px minmax(0, 1fr);
        justify-self: stretch;
      }

      .message.user .avatar {
        grid-column: 1;
        grid-row: 1;
      }

      .message.user .bubble {
        grid-column: 2;
        grid-row: 1;
      }

      .avatar {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">AI</div>
      <div>
        <h1>物流 Agent 对话台</h1>
        <p>业务问答、制度引用、工具调用与审计追踪</p>
      </div>
    </div>
    <div class="top-actions">
      <a class="button" href="/admin/actions.html">动作管理台</a>
      <button class="button" id="newConversationButton" type="button">新会话</button>
    </div>
  </header>

  <main class="shell">
    <aside class="sidebar" aria-label="对话上下文">
      <section>
        <div class="section-title">
          <h2>上下文</h2>
          <span class="chip info" id="contextBadge">T001</span>
        </div>
        <div class="field-list">
          <div class="field">
            <label for="tenantId">租户</label>
            <input id="tenantId" value="T001" autocomplete="off">
          </div>
          <div class="field">
            <label for="userId">用户</label>
            <input id="userId" value="u-cs-001" autocomplete="off">
          </div>
          <div class="field">
            <label for="roles">角色</label>
            <input id="roles" value="CUSTOMER_SERVICE" autocomplete="off">
          </div>
          <div class="field">
            <label for="conversationId">会话</label>
            <input id="conversationId" autocomplete="off">
          </div>
          <label class="toggle">
            <input id="returnCitations" type="checkbox" checked>
            <span>返回引用</span>
          </label>
        </div>
      </section>

      <section>
        <div class="section-title">
          <h2>常用问题</h2>
          <button class="button compact" id="reloadSamplesButton" type="button">刷新</button>
        </div>
        <div class="samples" id="samples">
          <div class="empty">正在加载</div>
        </div>
      </section>

      <section>
        <div class="section-title">
          <h2>当前状态</h2>
        </div>
        <div class="detail-block">
          <p><span class="muted">最近 trace：</span><span class="mono" id="latestTrace">暂无</span></p>
          <p><span class="muted">风险等级：</span><span id="latestRisk">暂无</span></p>
          <p><span class="muted">工具调用：</span><span id="latestToolCount">0 次</span></p>
        </div>
      </section>
    </aside>

    <section class="main">
      <section class="chat-panel" aria-labelledby="chatTitle">
        <div class="panel-head">
          <div>
            <h2 id="chatTitle">对话</h2>
            <p id="conversationLabel">准备就绪</p>
          </div>
          <div class="status-line" id="statusLine">未发送</div>
        </div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <div class="composer-row">
            <textarea id="messageInput" placeholder="输入物流业务问题，例如：客户 C001 最近 30 天为什么投诉量上升？" required></textarea>
            <button class="button primary" id="sendButton" type="submit">发送</button>
          </div>
        </form>
      </section>

      <aside class="details-panel" aria-labelledby="detailsTitle">
        <div class="panel-head">
          <div>
            <h2 id="detailsTitle">回答详情</h2>
            <p>引用、工具调用、审计入口</p>
          </div>
        </div>
        <div class="details-body" id="details">
          <div class="empty">暂无回答详情</div>
        </div>
      </aside>
    </section>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  const $ = (selector) => document.querySelector(selector);

  const fields = {
    tenantId: $("#tenantId"),
    userId: $("#userId"),
    roles: $("#roles"),
    conversationId: $("#conversationId"),
    returnCitations: $("#returnCitations"),
    messageInput: $("#messageInput")
  };

  const state = {
    sending: false,
    messages: []
  };

  function newConversationId() {
    return `conv-web-${new Date().toISOString().slice(0, 10).replaceAll("-", "")}-${Math.random().toString(16).slice(2, 8)}`;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function rolesValue() {
    return fields.roles.value.split(",").map((role) => role.trim()).filter(Boolean);
  }

  function updateContextBadge() {
    $("#contextBadge").textContent = fields.tenantId.value.trim() || "T001";
    $("#conversationLabel").textContent = fields.conversationId.value.trim() || "暂无会话";
  }

  function setStatus(text) {
    $("#statusLine").textContent = text;
  }

  function showToast(message) {
    const toast = $("#toast");
    toast.textContent = message;
    toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3600);
  }

  function riskChip(riskLevel) {
    const value = riskLevel || "UNKNOWN";
    const cls = value === "L1" ? "success" : value === "L2" ? "warn" : "danger";
    return `<span class="chip ${cls}">${escapeHtml(value)}</span>`;
  }

  function confidenceText(confidence) {
    if (confidence === undefined || confidence === null || Number.isNaN(Number(confidence))) {
      return "暂无";
    }
    return `${Math.round(Number(confidence) * 100)}%`;
  }

  function addMessage(role, content, meta = "") {
    state.messages.push({ role, content, meta });
    renderMessages();
  }

  function renderMessages() {
    const target = $("#messages");
    if (!state.messages.length) {
      target.innerHTML = `
        <article class="message assistant">
          <div class="avatar">AI</div>
          <div class="bubble">你好，我可以查询物流客户、运单、异常、工单和制度知识。</div>
        </article>
      `;
      return;
    }
    target.innerHTML = state.messages.map((message) => {
      if (message.role === "user") {
        return `
          <article class="message user">
            <div class="bubble">${escapeHtml(message.content)}</div>
            <div class="avatar">你</div>
          </article>
        `;
      }
      return `
        <article class="message assistant">
          <div class="avatar">AI</div>
          <div class="bubble">
            ${escapeHtml(message.content)}
            ${message.meta ? `<div class="message-meta">${message.meta}</div>` : ""}
          </div>
        </article>
      `;
    }).join("");
    target.scrollTop = target.scrollHeight;
  }

  async function api(path, options = {}) {
    const response = await fetch(path, {
      headers: { "Content-Type": "application/json", ...(options.headers || {}) },
      ...options
    });
    const text = await response.text();
    const payload = text ? JSON.parse(text) : null;
    if (!response.ok) {
      const message = payload?.message || payload?.error || text || response.statusText;
      throw new Error(message);
    }
    return payload;
  }

  async function sendMessage(message) {
    const request = {
      conversationId: fields.conversationId.value.trim() || newConversationId(),
      userId: fields.userId.value.trim() || "u-cs-001",
      tenantId: fields.tenantId.value.trim() || "T001",
      roles: rolesValue().length ? rolesValue() : ["CUSTOMER_SERVICE"],
      message,
      returnCitations: fields.returnCitations.checked
    };
    fields.conversationId.value = request.conversationId;
    updateContextBadge();
    return api("/api/agent/chat", {
      method: "POST",
      body: JSON.stringify(request)
    });
  }

  function renderDetails(response) {
    const citations = response.citations || [];
    const toolCalls = response.toolCalls || [];
    const traceId = response.traceId || "";
    $("#latestTrace").textContent = traceId || "暂无";
    $("#latestRisk").innerHTML = riskChip(response.riskLevel);
    $("#latestToolCount").textContent = `${toolCalls.length} 次`;
    const citationHtml = citations.length
      ? citations.map((citation) => `
        <div class="detail-block">
          <h3>${escapeHtml(citation.title || citation.sourceType || "引用")}</h3>
          <p class="mono muted">${escapeHtml(citation.docId || "-")} / ${escapeHtml(citation.chunkId || "-")}</p>
          <p>${escapeHtml(citation.excerpt || "")}</p>
        </div>
      `).join("")
      : `<div class="empty">暂无引用</div>`;
    const toolHtml = toolCalls.length
      ? `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>工具</th>
                <th>状态</th>
                <th>耗时</th>
                <th>摘要</th>
              </tr>
            </thead>
            <tbody>
              ${toolCalls.map((tool) => `
                <tr>
                  <td class="mono">${escapeHtml(tool.toolName || tool.tool || "-")}</td>
                  <td>${escapeHtml(tool.status)}</td>
                  <td>${escapeHtml(tool.latencyMs)} ms</td>
                  <td>${escapeHtml(tool.summary || tool.errorCode || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `
      : `<div class="empty">暂无工具调用</div>`;
    $("#details").innerHTML = `
      <div class="detail-block">
        <h3>审计</h3>
        <p><span class="muted">traceId：</span><span class="mono">${escapeHtml(traceId || "暂无")}</span></p>
        <p><span class="muted">风险等级：</span>${riskChip(response.riskLevel)}</p>
        <p><span class="muted">置信度：</span>${escapeHtml(confidenceText(response.confidence))}</p>
        ${traceId ? `<p><a class="button compact" href="/api/agent/audit/${encodeURIComponent(traceId)}" target="_blank" rel="noreferrer">打开审计</a></p>` : ""}
      </div>
      <div>
        <div class="section-title"><h2>引用</h2><span class="chip info">${citations.length} 条</span></div>
        ${citationHtml}
      </div>
      <div>
        <div class="section-title"><h2>工具调用</h2><span class="chip info">${toolCalls.length} 次</span></div>
        ${toolHtml}
      </div>
    `;
  }

  async function loadSamples() {
    const target = $("#samples");
    target.innerHTML = `<div class="empty">正在加载</div>`;
    try {
      const payload = await api("/api/demo/questions");
      const questions = Array.isArray(payload) ? payload : payload.questions || [];
      target.innerHTML = questions.map((question) => `
        <button class="sample" type="button" data-question="${escapeHtml(question)}">${escapeHtml(question)}</button>
      `).join("");
    } catch (error) {
      target.innerHTML = `
        <button class="sample" type="button" data-question="客户 C001 最近 30 天为什么投诉量上升？相关处理制度是什么？">客户 C001 最近 30 天为什么投诉量上升？相关处理制度是什么？</button>
        <button class="sample" type="button" data-question="运单 WB202606010023 是否可能满足延误赔付条件？">运单 WB202606010023 是否可能满足延误赔付条件？</button>
      `;
      showToast(error.message);
    }
  }

  function resetConversation() {
    fields.conversationId.value = newConversationId();
    state.messages = [];
    $("#details").innerHTML = `<div class="empty">暂无回答详情</div>`;
    $("#latestTrace").textContent = "暂无";
    $("#latestRisk").textContent = "暂无";
    $("#latestToolCount").textContent = "0 次";
    setStatus("未发送");
    updateContextBadge();
    renderMessages();
  }

  $("#chatForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    const message = fields.messageInput.value.trim();
    if (!message || state.sending) {
      return;
    }
    state.sending = true;
    $("#sendButton").disabled = true;
    fields.messageInput.value = "";
    addMessage("user", message);
    addMessage("assistant", "正在查询业务数据和知识库...");
    setStatus("请求中");
    try {
      const response = await sendMessage(message);
      state.messages.pop();
      const meta = `
        ${riskChip(response.riskLevel)}
        <span class="chip info">置信度 ${escapeHtml(confidenceText(response.confidence))}</span>
        <span class="chip">${escapeHtml((response.toolCalls || []).length)} 次工具调用</span>
      `;
      addMessage("assistant", response.answer || "暂无回答", meta);
      renderDetails(response);
      setStatus("已完成");
    } catch (error) {
      state.messages.pop();
      addMessage("assistant", `请求失败：${error.message}`, `<span class="chip danger">ERROR</span>`);
      setStatus("失败");
      showToast(error.message);
    } finally {
      state.sending = false;
      $("#sendButton").disabled = false;
      fields.messageInput.focus();
    }
  });

  $("#newConversationButton").addEventListener("click", resetConversation);
  $("#reloadSamplesButton").addEventListener("click", loadSamples);
  $("#samples").addEventListener("click", (event) => {
    const button = event.target.closest("button[data-question]");
    if (!button) {
      return;
    }
    fields.messageInput.value = button.dataset.question;
    fields.messageInput.focus();
  });

  [fields.tenantId, fields.userId, fields.roles, fields.conversationId].forEach((field) => {
    field.addEventListener("input", updateContextBadge);
  });

  resetConversation();
  loadSamples();
</script>
</body>
</html>
