spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoint:
    health:
      show-details: never

agent:
  deployment:
    environment: prod
    fail-fast: true
  security:
    mode: ${AGENT_AUTH_MODE:api-key}
    api-key: ${AGENT_API_KEY:}
  demo:
    reset-on-start: false
  deepseek:
    enabled: true
    api-key-file: ${DEEPSEEK_API_KEY_FILE}
  embedding:
    fallback-to-hashing: false
  vector-store:
    enabled: true
    fail-fast: true
    jdbc-url: ${PGVECTOR_JDBC_URL}
    username: ${PGVECTOR_USERNAME}
    password: ${PGVECTOR_PASSWORD}
