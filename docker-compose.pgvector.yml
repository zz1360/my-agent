services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: logistics-agent-pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-logistics_agent}
      POSTGRES_USER: ${PGVECTOR_USERNAME:-logistics_agent}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:?PGVECTOR_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
