services:
  logistics-agent-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: logistics-agent-web:prod
    container_name: logistics-agent-web
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    environment:
      AGENT_BACKEND_URL: http://logistics-agent:8080
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_TENANT: ${AGENT_TENANT:-T001}
      AGENT_USER: ${AGENT_USER:-web-gateway}
      AGENT_ROLES: ${AGENT_ROLES:-OPS_MANAGER}
    depends_on:
      logistics-agent:
        condition: service_healthy
    restart: unless-stopped

  logistics-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: logistics-agent:prod
    container_name: logistics-agent
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      AGENT_ENVIRONMENT: prod
      AGENT_AUTH_MODE: ${AGENT_AUTH_MODE:-api-key}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_OIDC_ISSUER_URI: ${AGENT_OIDC_ISSUER_URI:-}
      AGENT_OIDC_CLIENT_ID: ${AGENT_OIDC_CLIENT_ID:-}
      AGENT_OIDC_CLIENT_SECRET: ${AGENT_OIDC_CLIENT_SECRET:-}
      AGENT_OIDC_TENANT_CLAIM: ${AGENT_OIDC_TENANT_CLAIM:-tenant_id}
      AGENT_OIDC_USER_CLAIM: ${AGENT_OIDC_USER_CLAIM:-preferred_username}
      AGENT_OIDC_ROLES_CLAIM: ${AGENT_OIDC_ROLES_CLAIM:-roles}
      AGENT_OIDC_DEFAULT_TENANT: ${AGENT_OIDC_DEFAULT_TENANT:-T001}
      AGENT_POST_LOGIN_REDIRECT: ${AGENT_POST_LOGIN_REDIRECT:-/operations/overview}
      AGENT_SESSION_COOKIE_SECURE: ${AGENT_SESSION_COOKIE_SECURE:-true}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      DEEPSEEK_API_KEY_FILE: /run/secrets/deepseek_api_key
      PGVECTOR_JDBC_URL: ${PGVECTOR_JDBC_URL}
      PGVECTOR_USERNAME: ${PGVECTOR_USERNAME}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      AGENT_RETRIEVAL_DEFAULT_MODE: ${AGENT_RETRIEVAL_DEFAULT_MODE:-hybrid_reranker}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1024m}
    secrets:
      - deepseek_api_key
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

secrets:
  deepseek_api_key:
    file: ${DEEPSEEK_API_KEY_FILE}
